name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath .\manifest.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        shell: pwsh
        run: |
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart("v")
          if ($tagVersion -ne "${{ steps.version.outputs.version }}") {
            throw "Tag version $tagVersion does not match manifest version ${{ steps.version.outputs.version }}"
          }

      - name: Validate tag commit is on main
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${env:GITHUB_SHA}" origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag ${env:GITHUB_REF_NAME} points to ${env:GITHUB_SHA}, which is not on origin/main. Push main first, then push the tag."
          }

      - name: Build XPI
        shell: pwsh
        run: .\build.ps1

      - name: Prepare release asset
        shell: pwsh
        run: |
          Copy-Item -LiteralPath ".\dist\zotero-copilot-${{ steps.version.outputs.version }}.xpi" -Destination ".\zotero-copilot.xpi" -Force

      - name: Update release metadata on main
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = "updates.json";
            const contentObject = {
              addons: {
                "zotero-copilot@example.com": {
                  updates: [
                    {
                      version,
                      update_link: `https://github.com/${owner}/${repo}/releases/latest/download/zotero-copilot.xpi`,
                      applications: {
                        zotero: {
                          strict_min_version: "8.0",
                          strict_max_version: "9.*"
                        }
                      }
                    }
                  ]
                }
              }
            };
            const nextContent = `${JSON.stringify(contentObject, null, 2)}\n`;

            let existing = null;
            try {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: "main"
              });
              if (!Array.isArray(response.data)) {
                existing = response.data;
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (existing) {
              const currentContent = Buffer.from(existing.content, "base64").toString("utf8");
              if (currentContent === nextContent) {
                core.info("updates.json already matches the release version");
                return;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: "main",
              message: `chore: update release metadata for v${version}`,
              content: Buffer.from(nextContent, "utf8").toString("base64"),
              sha: existing?.sha
            });

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: zotero-copilot.xpi
